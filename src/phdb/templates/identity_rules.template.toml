# identity_rules.toml — coalescence rule pack for the people + places facets.
#
# This file is consulted by phdb.facets.people (and phdb.facets.places
# in Phase 8B) at coalesce-time. If it's missing or this section is
# empty, the facet falls back to bundled defaults
# (DEFAULT_PEOPLE_RULES in phdb.facets.people.coalescence).
#
# Copy this file into your personal-history-instance/ directory as
# `identity_rules.toml` and edit the rules to match your data
# patterns.
#
# Rule shapes supported by phdb.facets._coalescence_lib (people + shared):
#   - exact_field           — single-field equality after normalization
#   - two_field             — both named fields must match
#   - regex                 — regex with optional capture group
#   - named_location        — same name (normalized) = same place
#   - alias_list            — both emissions must have a field value
#                             that appears in a hand-curated alias set
#                             (config: field, aliases = [...],
#                             optional normalize)
#
# Rule shapes added by phdb.facets.places.coalescence (Phase 8B):
#   - geo_radius_meters     — haversine within radius_m meters
#                             (config: radius_m, optional lat_field,
#                             optional lon_field — defaults "lat"/"lon")
#   - named_location_exact  — same name (lowercase + collapsed
#                             whitespace) = same place
#
# Normalization options:
#   - lowercase          — str.lower() + str.strip()
#   - lowercase_strip    — lower + strip + collapse internal whitespace
#                          (places-only; default for named_location_exact)
#   - e164               — phone-number canonicalization
#   - strip              — whitespace strip only
#   - none / unspecified — raw equality
#
# Confidence: 0.0–1.0.
#   - >= 0.90 auto-merges (no human review)
#   - 0.5–0.89 surfaced to interactive review CLI (Phase 8C)
#   - require_manual_review=true forces review regardless of confidence

# ────────────────────────────────────────────────────────────────────
# People rules — copied from phdb.facets.people.coalescence defaults.
# ────────────────────────────────────────────────────────────────────

[[rules.people]]
name = "exact_email_local_domain"
shape = "exact_field"
field = "email"
normalize = "lowercase"
confidence = 0.95
notes = "Same lowercased email = same person (strongest signal)."

[[rules.people]]
name = "phone_e164"
shape = "exact_field"
field = "phone"
normalize = "e164"
confidence = 0.95
notes = "Same E.164-normalized phone = same person."

[[rules.people]]
name = "discord_handle"
shape = "exact_field"
field = "discord_handle"
normalize = "lowercase"
confidence = 0.85
notes = "Same case-insensitive Discord handle = same person."

[[rules.people]]
name = "same_full_name_same_email_domain"
shape = "two_field"
fields = ["full_name", "email_domain"]
normalize = "lowercase"
confidence = 0.75
notes = "Medium confidence — collides on common names in shared domains."

[[rules.people]]
name = "same_first_last"
shape = "two_field"
fields = ["first_name", "last_name"]
normalize = "lowercase"
confidence = 0.40
require_manual_review = true
notes = "Lowest confidence; routed to Phase 8C review CLI."

# ────────────────────────────────────────────────────────────────────
# Hand-curated alias clusters — use alias_list when a single real
# person operated multiple handles across protocols/eras that share
# no derivable property (no common email local-part, no shared
# phone, no matching display name). Each rule asserts: any two
# emissions whose <field> is in this list refer to the same person.
#
# Confidence ≥ 0.90 auto-merges; for hand-curated clusters this is
# usually 1.0 (you've manually verified the cluster). Lower the
# confidence and set require_manual_review = true if you want the
# cluster to surface in the review CLI before being applied.
#
# Example: one person who migrated AIM → MSN → MSN-Plus over years,
# using a different handle on each protocol plus an RP persona.
# ────────────────────────────────────────────────────────────────────
#
# [[rules.people]]
# name = "manual_alias_example"
# shape = "alias_list"
# field = "address"
# aliases = [
#     "example_aim_handle",
#     "example_msn@hotmail.com",
#     "example_rp_persona",
# ]
# normalize = "lowercase"
# confidence = 1.0
# notes = "Hand-curated — verified same person across AIM/MSN/RP."

# ────────────────────────────────────────────────────────────────────
# Places rules — copied from phdb.facets.places.coalescence defaults.
# The haversine geo predicate matches when the great-circle distance
# between two (lat, lon) pairs is <= radius_m meters (inclusive).
# Emissions missing lat or lon never match a geo rule.
# ────────────────────────────────────────────────────────────────────

[[rules.places]]
name = "geo_within_100m"
shape = "geo_radius_meters"
radius_m = 100
confidence = 0.85
notes = "Same coords within 100m (haversine) = same place. Tight radius for stationary captures."

[[rules.places]]
name = "geo_within_500m"
shape = "geo_radius_meters"
radius_m = 500
confidence = 0.65
require_manual_review = true
notes = "Wider radius for degraded GPS lock; routed to Phase 8C review CLI regardless of confidence."

[[rules.places]]
name = "named_location_exact"
shape = "named_location_exact"
field = "name"
normalize = "lowercase_strip"
confidence = 0.80
notes = "Same normalized place name = same place. Useful when GPS is missing but source labeled the place (e.g., Google Timeline visits)."
