[phdb]
manifest_version = 1

[plugin]
name = "clippings"
version = "0.1.0"
description = "Vault Resources/Clippings/ + Resources/Reddit Posts/ markdown notes → clippings typed table"
kind = "source"
entry_point = "phdb.plugins.clippings:ClippingsPlugin"

[source]
emits = ["Quotation"]
