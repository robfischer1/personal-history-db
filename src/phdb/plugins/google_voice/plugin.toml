[phdb]
manifest_version = 1

[plugin]
name = "google_voice"
version = "0.4.0"
description = "Google Voice call/text/voicemail HTMLs from Takeout"
kind = "source"
entry_point = "phdb.plugins.google_voice:GoogleVoicePlugin"

[source]
emits = ["Message", "Action"]
entity_refs = []
formats_used = ["google_voice_html"]
records_required = ["ChatMessage", "CallRecord"]
sidecars = []
embeddable_tables = ["chat_messages", "actions"]
facets_projected = ["Person", "Time", "Thread"]
