[phdb]
manifest_version = 1

[plugin]
name = "vault_entities"
version = "0.1.0"
description = "Vault Entities/ named-object subdirs — People, Organizations, Places, Software, Supplements into typed tables"
kind = "source"
entry_point = "phdb.plugins.vault_entities:VaultEntitiesPlugin"

[source]
emits = ["Person", "Organization", "Corporation", "Periodical", "Store", "Restaurant", "HealthClub", "CafeOrCoffeeShop", "Residence", "Place", "SoftwareApplication", "DietarySupplement"]
entity_refs = []
formats_used = ["vault_entity_md"]
records_required = ["Provenance"]
sidecars = []
embeddable_tables = []
facets_projected = []
