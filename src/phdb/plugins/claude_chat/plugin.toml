[phdb]
manifest_version = 1

[plugin]
name = "claude_chat"
version = "0.1.0"
description = "Claude.ai data export ingester (conversations, memories, users, projects)"
kind = "source"
entry_point = "phdb.plugins.claude_chat:ClaudeChatPlugin"

[source]
emits = ["Conversation", "Thing", "Person", "CreativeWork", "DigitalDocument"]
entity_refs = []
formats_used = ["claude_chat_json"]
records_required = ["AISessionMessage"]
sidecars = []
embeddable_tables = []
facets_projected = []
