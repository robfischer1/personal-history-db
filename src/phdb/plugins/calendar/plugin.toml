[phdb]
manifest_version = 1

[plugin]
name = "calendar"
version = "0.4.0"
description = "iCal (.ics) calendar exports — events, invites, reminders"
kind = "source"
entry_point = "phdb.plugins.calendar:CalendarPlugin"

[source]
emits = ["Event", "InviteAction", "Action"]
entity_refs = []
formats_used = ["ical"]
records_required = ["CalendarEvent"]
sidecars = []
embeddable_tables = []
facets_projected = ["Time", "Person"]
