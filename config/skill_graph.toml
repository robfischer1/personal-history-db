# Skill-graph readiness engine configuration.
# Sibling of decay_policy.toml; tunable per Skill Graph plan D10.
# Daily recompute picks up changes — no code edits needed.

[tiers]
# Tier definitions: half_life_days, base_value, floor_fraction.
# floor = asserted_baseline * floor_fraction (per-discipline; the floor
# anchors to what Rob actually asserted, not a static tier base).

[tiers.foundation]
half_life_days = 730    # 2 years — fundamentals (math, syntax basics)
base_value = 1.0
floor_fraction = 0.10

[tiers.active]
half_life_days = 180    # 6 months — currently-engaged disciplines
base_value = 1.0
floor_fraction = 0.05

[tiers.background]
half_life_days = 60     # 2 months — less-engaged disciplines
base_value = 1.0
floor_fraction = 0.02

[engagement]
# Each rob-authored practice event injects this fraction of base_value as a
# boost. Boost decays with the same half-life as the tier.
boost_fraction = 0.05

[atrophy]
# Atrophy alarm fires when the no-practice projection would have dropped
# readiness below this fraction of the asserted baseline.
alarm_fraction = 0.50

[discipline_tiers]
# Default tier per discipline. Override per-write via the `tier` qualifier.
# Phase 5+ populates more disciplines; V1 starts with Programming.
Programming = "active"
